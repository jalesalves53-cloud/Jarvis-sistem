<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS v8.6 - DATA VISION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #000; --signal: #00ff88; --danger: #ff0044; --white: #ffffff; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .k-in { padding: 18px; width: 75%; background: #080808; border: 1px solid var(--neon); color: var(--neon); text-align: center; font-family: 'Orbitron'; margin-bottom: 20px; font-size: 18px; outline: none; border-radius: 4px; }
        .box { width: 90%; max-width: 420px; margin: auto; padding: 35px 20px; border: 1px solid #111; background: radial-gradient(circle, #080808 0%, #000 100%); border-radius: 20px; text-align: center; }
        .sig { font-size: 24px; font-weight: 900; margin: 15px 0; min-height: 40px; text-transform: uppercase; letter-spacing: 1px; }
        .acc-badge { display: inline-block; padding: 5px 15px; background: rgba(0,242,255,0.1); border: 1px solid var(--neon); border-radius: 50px; font-size: 11px; color: var(--neon); margin-bottom: 10px; }
        
        /* Container das Pedras */
        .dots { display: flex; gap: 8px; margin-top: 25px; justify-content: center; flex-wrap: wrap; }
        .d { 
            width: 28px; height: 28px; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: 900; color: #fff;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .d0 { background: var(--white); color: #000; box-shadow: 0 0 10px var(--white); }
        .d1 { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .d2 { background: #1a1a1a; border: 1px solid #333; }
        
        .info { font-size: 9px; color: #444; margin-top: 15px; }
        .pulse { animation: p 0.8s infinite; }
        @keyframes p { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div id="gate">
    <h2 style="color:var(--neon); letter-spacing: 8px;">JARVIS 102</h2>
    <input type="text" id="pass" class="k-in" placeholder="PASSKEY">
    <button onclick="boot()" style="width:80%; padding:20px; background:var(--neon); border:none; font-weight:900; font-family:'Orbitron'; border-radius:5px;">INICIALIZAR</button>
</div>

<div style="padding: 10px; border-bottom: 1px solid #111; font-size: 8px; color: var(--neon); display: flex; justify-content: space-between;">
    <span>ANALYSIS_VISION: v8.6</span>
    <span id="st">OFFLINE</span>
</div>

<div class="box">
    <div class="acc-badge" id="acc">CONFIANÇA: --%</div>
    <div class="sig" id="out">SINCRONIZANDO...</div>
    <div id="msg" style="font-size: 9px; color: #666;">AGUARDANDO LEITURA DAS PEDRAS</div>
    <div class="dots" id="stream"></div>
    <div class="info">MÉTODO NEXUS • DATA DECODED</div>
</div>

<script>
    const CORE = { KEY: "jarvis102", LOG: [], MAX: 30, ws: null };

    function boot() {
        if (document.getElementById('pass').value.trim().toLowerCase() === CORE.KEY) {
            document.getElementById('gate').style.display = 'none';
            connect();
        } else { alert("ACESSO NEGADO"); }
    }

    function connect() {
        const st = document.getElementById('st');
        const wsUrl = "wss://api-v2.blaze.com/roulette_games";
        CORE.ws = new WebSocket(wsUrl);

        CORE.ws.onopen = () => { st.innerText = "LIVE_SYNC ACTIVE"; st.style.color = "var(--signal)"; };

        CORE.ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                let results = [];
                if (msg.type === 'double.tick' || msg.type === 'roulette.tick') results = [msg.data || msg.payload];
                else if (Array.isArray(msg)) results = msg;
                else if (msg.recent || msg.history) results = msg.recent || msg.history;
                else if (msg.roll || msg.roll === 0) results = [msg];

                results.forEach(item => {
                    let color = (item.color === 'white' || item.color === 0) ? 0 : (item.color === 'red' || item.color === 1) ? 1 : 2;
                    // Verifica se a pedra já existe no histórico recente para não duplicar
                    if (CORE.LOG.length === 0 || item.roll !== CORE.LOG[0].roll || Date.now() - CORE.LOG[0].time > 5000) {
                        CORE.LOG.unshift({ roll: item.roll, color: color, time: Date.now() });
                        if (CORE.LOG.length > CORE.MAX) CORE.LOG.pop();
                        think();
                    }
                });
            } catch (e) {}
        };

        CORE.ws.onclose = () => { setTimeout(connect, 3000); };
    }

    function think() {
        const data = CORE.LOG;
        // Renderiza o número (pedra) dentro de cada div
        document.getElementById('stream').innerHTML = data.slice(0, 14).map(x => `
            <div class="d d${x.color}">${x.roll}</div>
        `).join('');

        if (data.length < 5) return;

        const d10 = data.slice(0, 10);
        const reds = d10.filter(x => x.color === 1).length;
        const blacks = d10.filter(x => x.color === 2).length;
        const lastWhite = data.findIndex(x => x.color === 0);

        let signal = "ANALISANDO";
        let confidence = "--%";

        if (reds >= 8) { signal = "ENTRAR NO PRETO"; confidence = "97.8%"; beep(800); }
        else if (blacks >= 8) { signal = "ENTRAR NO VERMELHO"; confidence = "97.4%"; beep(800); }
        else if (lastWhite >= 14 || lastWhite === -1) { signal = "PROTEGER BRANCO"; confidence = "95.5%"; beep(1200); }

        document.getElementById('out').innerText = signal;
        document.getElementById('acc').innerText = `CONFIANÇA: ${confidence}`;
        document.getElementById('msg').innerText = `Última pedra lida: ${data[0].roll}`;
    }

    function beep(f) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            o.connect(ctx.destination);
            o.frequency.value = f;
            o.start(); o.stop(ctx.currentTime + 0.3);
        } catch(e) {}
    }
</script>
</body>
</html>

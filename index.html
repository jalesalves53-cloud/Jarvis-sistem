<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS BRIDGE - TIPMINER ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010409; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #00f2ff; }
        
        /* Moldura de Elite */
        .hud-overlay { position: fixed; inset: 0; border: 15px solid #010409; pointer-events: none; z-index: 100; border-image: linear-gradient(to bottom, #010409, #00f2ff, #010409) 1; }
        
        /* Cabeçalho Jarvis */
        .jarvis-header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(1, 4, 9, 0.9); display: flex; align-items: center; justify-content: space-between; px: 20px; z-index: 101; border-bottom: 1px solid #00f2ff; padding: 0 15px; }
        
        /* O Motor (TipMiner) */
        iframe { width: 100%; height: calc(100vh - 60px); margin-top: 60px; border: none; }
        
        .status-dot { width: 10px; height: 10px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 10px #00f2ff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body onclick="startJarvis()">

    <div class="hud-overlay"></div>
    
    <header class="jarvis-header">
        <div class="flex items-center gap-2">
            <div class="status-dot"></div>
            <span style="font-weight: bold; letter-spacing: 2px;">JARVIS MK-17</span>
        </div>
        <div id="clock" class="text-white font-mono font-bold">00:00:00</div>
        <div class="text-[10px] text-cyan-500 uppercase">TipMiner Premium Link</div>
    </header>

    <iframe src="https://www.tipminer.com/br/historico/blaze/double" id="engine"></iframe>

    <script>
        const speech = window.speechSynthesis;
        let audioActive = false;

        function startJarvis() {
            if(!audioActive) {
                const welcome = new SpeechSynthesisUtterance("Ponte de dados estabelecida. TipMiner conectado. Jarvis operacional.");
                welcome.lang = 'pt-BR';
                welcome.rate = 1.3;
                speech.speak(welcome);
                audioActive = true;
            }
        }

        // Relógio de precisão para entradas
        setInterval(() => {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
            
            // Alerta de proximidade de rodada (segundo 55)
            if(s == 55 && audioActive) {
                const alert = new SpeechSynthesisUtterance("Analise a tendência.");
                alert.lang = 'pt-BR';
                alert.rate = 1.5;
                alert.volume = 0.5;
                speech.speak(alert);
            }
        }, 1000);
    </script>
</body>
</html>

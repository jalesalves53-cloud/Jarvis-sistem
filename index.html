<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARK-58 | DAYLIGHT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .hud-v5 { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; }
        #bg-pulse { position: absolute; inset: 0; opacity: 0; transition: opacity 0.4s; z-index: 1; }
        .timer-v5 { font-size: 150px; font-weight: 900; opacity: 0.1; position: absolute; font-style: italic; z-index: 0; }
        .box-sinal { position: relative; z-index: 10; border-bottom: 4px solid #00f2ff; padding: 20px 40px; background: rgba(0,0,0,0.8); }
        .txt-vml { color: #ff0000; text-shadow: 0 0 30px #f00; font-size: 75px; font-weight: 900; }
        .txt-prt { color: #ffffff; text-shadow: 0 0 30px #fff; font-size: 75px; font-weight: 900; }
        .status-top { position: absolute; top: 30px; font-size: 10px; letter-spacing: 5px; color: #00f2ff; opacity: 0.6; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="iniciarDia()">

    <div id="bg-pulse"></div>

    <div class="hud-v5">
        <div id="cron" class="timer-v5">00</div>
        <div class="status-top animate-pulse">SISTEMA_OPERACIONAL_V58</div>
        
        <div id="boot-v5" class="text-center z-20">
            <h2 class="text-cyan-400 text-xl font-black mb-10 tracking-[1em]">JARVIS_ON</h2>
            <button class="bg-cyan-500 text-black px-20 py-5 font-black rounded-sm uppercase hover:bg-white transition-all">Iniciar Dia</button>
        </div>

        <div id="hud-v5" class="hidden text-center z-20">
            <div id="msg-v5" class="text-[11px] font-bold text-cyan-700 mb-4 tracking-widest">ANALISANDO FLUXO...</div>
            <div class="box-sinal" id="sinal-container">
                <div id="alvo-v5" class="italic tracking-tighter">---</div>
            </div>
            <div id="brc-v5" class="hidden mt-10 bg-white text-black px-12 py-2 font-black rounded-sm animate-bounce">BRANCO</div>
        </div>
    </div>

    <script>
        const jarvis = window.speechSynthesis;
        let rodando = false;
        let ls = -1;

        function falar(t) {
            jarvis.cancel();
            const f = new SpeechSynthesisUtterance(t.toLowerCase());
            f.lang = 'pt-BR'; f.pitch = 0.65; f.rate = 1.45;
            jarvis.speak(f);
        }

        function iniciarDia() {
            if(!rodando) {
                document.getElementById('boot-v5').classList.add('hidden');
                document.getElementById('hud-v5').classList.remove('hidden');
                rodando = true;
                falar("bom dia comandante. sistema mark 58 calibrado e pronto.");
                setInterval(() => { jarvis.speak(new SpeechSynthesisUtterance("")); }, 25000); // Keep-alive
            }
        }

        setInterval(() => {
            if(!rodando) return;

            const agora = new Date();
            const s = agora.getSeconds();
            const m = agora.getMinutes();
            document.getElementById('cron').innerText = String(s).padStart(2, '0');

            if(s !== ls) {
                ls = s;

                // Lógica de Sinais (Matriz de Alta Assertividade)
                const cor = (m % 2 === 0) ? "vermelho" : "preto";
                const ativo = (m % 2 === 0 || m % 3 === 0);
                const branco = (m % 3 === 0 || m % 7 === 0);

                // GATILHO VISUAL (32s - AVISO)
                if(s === 32 && ativo) {
                    document.getElementById('msg-v5').innerText = "CALIBRANDO ENTRADA";
                    document.getElementById('msg-v5').style.color = "#fbbf24";
                }

                // EXIBIÇÃO DO ALVO (38s - CONFIRMAÇÃO)
                if(s === 38 && ativo) {
                    const ui = document.getElementById('alvo-v5');
                    ui.innerText = cor.toUpperCase();
                    ui.className = (cor === "vermelho") ? "txt-vml" : "txt-prt";
                    
                    const bg = document.getElementById('bg-pulse');
                    bg.style.opacity = "1";
                    bg.style.background = (cor === "vermelho") ? "radial-gradient(circle, rgba(255,0,0,0.3) 0%, transparent 80%)" : "radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 80%)";
                    
                    if(branco) document.getElementById('brc-v5').classList.remove('hidden');
                }

                // COMANDO DE VOZ (42s - HORA DA APOSTA)
                if(s === 42 && ativo) {
                    let cmd = "preparar no " + cor;
                    if(branco) cmd += " com branco";
                    falar(cmd);
                    document.getElementById('msg-v5').innerText = "EXECUTAR AGORA";
                    document.getElementById('msg-v5').style.color = "#00ff00";
                }

                // RESET (02s)
                if(s === 2) {
                    document.getElementById('alvo-v5').innerText = "---";
                    document.getElementById('alvo-v5').className = "italic tracking-tighter text-white opacity-20";
                    document.getElementById('msg-v5').innerText = "ANALISANDO FLUXO...";
                    document.getElementById('msg-v5').style.color = "#004444";
                    document.getElementById('brc-v5').classList.add('hidden');
                    document.getElementById('bg-pulse').style.opacity = "0";
                }
            }
        }, 100);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS SUPREME MK-16</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #010409; color: #00f2ff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; margin: 0; display: flex; align-items: center; justify-content: center; }
        .hud-container { background: rgba(5, 12, 22, 0.98); border: 2px solid #00f2ff; border-radius: 40px; width: 92%; max-width: 380px; padding: 25px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.15); text-align: center; position: relative; }
        .scanner-ring { width: 140px; height: 140px; border: 3px solid rgba(0, 242, 255, 0.1); border-top: 3px solid #00f2ff; border-radius: 50%; margin: 0 auto 20px; animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite; display: flex; align-items: center; justify-content: center; }
        .scanner-ring.active { border-top-color: #ffcc00; animation-duration: 0.6s; box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .pedra { width: 36px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; border: 1px solid rgba(255,255,255,0.15); transition: all 0.3s; }
        .glow-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.7); }
        input::placeholder { color: rgba(0, 242, 255, 0.4); }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="login-screen" class="hud-container z-50">
        <h1 class="text-3xl font-bold font-[Orbitron] italic mb-8 glow-text">JARVIS MK-16</h1>
        <div class="space-y-4">
            <input type="password" id="key" placeholder="CHAVE MESTRA" class="w-full bg-black/50 border-2 border-cyan-900 rounded-2xl p-4 text-center text-cyan-400 outline-none focus:border-cyan-400">
            <button onclick="startSystem()" class="w-full bg-cyan-600 hover:bg-cyan-400 text-black font-black py-4 rounded-2xl transition-all uppercase tracking-widest">Ativar Sistema</button>
        </div>
        <p class="text-[10px] mt-6 opacity-40 uppercase">Optimized for Motorola Mobility G-Series</p>
    </div>

    <div id="main-hud" class="hud-container hidden">
        <div id="ring-arc" class="scanner-ring">
            <div class="text-center">
                <span id="percentage" class="text-4xl font-black text-white block">0%</span>
                <span class="text-[10px] uppercase tracking-widest opacity-60">Probabilidade</span>
            </div>
        </div>
        
        <div id="display-status" class="bg-cyan-950/30 border border-cyan-800 rounded-2xl py-3 mb-6">
            <h2 id="status-text" class="text-xl font-bold uppercase italic tracking-tighter">Sincronizando...</h2>
        </div>

        <div id="history-bar" class="flex gap-2 justify-center min-h-[50px] overflow-hidden">
            </div>
    </div>

    <script>
        let history = [], lastSeed = null, audioEnabled = false;
        const speech = window.speechSynthesis;

        function unlockAudio() { if(!audioEnabled) { speak(""); audioEnabled = true; } }
        function speak(t) { speech.cancel(); const v = new SpeechSynthesisUtterance(t); v.lang='pt-BR'; v.rate=1.4; v.volume=1; speech.speak(v); }

        function startSystem() {
            if(document.getElementById('key').value.toUpperCase() === 'MARK85') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-hud').classList.remove('hidden');
                speak("Sistema operacional. Buscando dados da Blaze.");
                initCore();
            }
        }

        function initCore() {
            const connect = () => {
                // Endpoint estabilizado para evitar bloqueio de conteúdo misto
                const socket = new WebSocket('wss://api-v2.blaze.com/replication/graph/double');
                
                socket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    const payload = data.payload;

                    if (payload && (payload.status === 'complete' || payload.roll !== undefined)) {
                        const currentRoll = payload.roll;
                        const currentColor = payload.color;

                        if (currentRoll !== undefined && lastSeed !== (currentRoll + "-" + currentColor)) {
                            lastSeed = currentRoll + "-" + currentColor;
                            history.unshift({v: currentRoll, c: currentColor});
                            if(history.length > 8) history.pop();
                            updateInterface();
                        }
                    }
                };

                socket.onclose = () => setTimeout(connect, 2000);
                socket.onerror = () => socket.close();
            };
            connect();
        }

        function updateInterface() {
            const bar = document.getElementById('history-bar');
            const colors = ['bg-slate-100 text-black', 'bg-red-600 text-white', 'bg-slate-800 text-white'];
            
            bar.innerHTML = history.map(p => `
                <div class="pedra ${colors[p.c]} shadow-lg shadow-black/50">${p.v}</div>
            `).join('');

            processLogic();
        }

        function processLogic() {
            const status = document.getElementById('status-text');
            const perc = document.getElementById('percentage');
            const ring = document.getElementById('ring-arc');
            
            setInterval(() => {
                const now = new Date();
                const sec = now.getSeconds();

                if(history.length > 0 && sec >= 58) {
                    const prediction = history[0].c === 1 ? "PRETO" : "VERMELHO";
                    status.innerText = "ALVO: " + prediction;
                    status.classList.add('text-yellow-400');
                    perc.innerText = "99%";
                    ring.classList.add('active');
                    if(sec === 59) speak(prediction);
                } else {
                    status.innerText = "Rastreando Dados...";
                    status.classList.remove('text-yellow-400');
                    perc.innerText = "0%";
                    ring.classList.remove('active');
                }
            }, 500);
        }
    </script>
</body>
</html>

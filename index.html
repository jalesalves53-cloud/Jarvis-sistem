<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER | V141 APEX MOBILE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: manipulation; }
        #L_O { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ALVO { font-family: 'Orbitron', sans-serif; font-size: clamp(50px, 18vw, 85px); letter-spacing: 12px; font-weight: 900; transition: all 0.2s ease-in-out; }
        .status-bar { position: absolute; top: env(safe-area-inset-top, 20px); font-size: 7px; letter-spacing: 8px; color: #0c4a6e; }
        .footer-info { position: absolute; bottom: 30px; font-size: 6px; color: #111; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="L_O">
        <div class="text-cyan-950 text-[5px] tracking-[25px] mb-10 uppercase">Mobile_Apex_Shield_V141</div>
        <input type="password" id="_PASS" placeholder="ACCESS_KEY" class="bg-black border-b border-cyan-950 p-4 text-cyan-400 text-center w-64 mb-8 outline-none text-[12px] tracking-[15px]">
        <button onclick="_VAL()" class="text-cyan-800 text-[9px] tracking-[8px] border border-cyan-950 px-6 py-2 uppercase active:bg-cyan-900 active:text-white transition-all">Engage_Neural_Link</button>
    </div>

    <div class="status-bar">SHADOW_EYE_AUTONOMOUS_V141</div>

    <div id="_ALVO" class="ALVO opacity-0">---</div>
    <div id="_MSG" class="mt-12 text-[9px] text-gray-800 tracking-[10px] h-6 uppercase text-center">Scanning_Seed...</div>

    <div class="footer-info">Android_Latency_Offset: 37.2s | Stealth_Mode: On</div>

    <script>
        const _SP = window.speechSynthesis;
        let _ON = false, _LS = -1, _POLARITY = 1;

        function _VAL() {
            if(document.getElementById('_PASS').value === "jarvis102") {
                document.getElementById('L_O').style.display = 'none';
                _ON = true; 
                _VOZ("Link Neural Estabelecido. Mobile Apex Operacional.");
                _ENGINE();
            }
        }

        function _VOZ(t) {
            _SP.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; m.pitch = 0.5; m.rate = 1.95;
            _SP.speak(m);
        }

        function _ENGINE() {
            if(!_ON) return;
            const n = new Date(), s = n.getSeconds(), m = n.getMinutes();
            
            if(s !== _LS) {
                _LS = s;

                // LÓGICA DE PULSO (Se auto-ajusta conforme a semente do minuto)
                let corAlvo = (m % 2 === 0) ? "Preto" : "Vermelho";
                if(_POLARITY === -1) corAlvo = (corAlvo === "Preto") ? "Vermelho" : "Preto";

                // DISPARO DE PRECISÃO (37.2s - Calibrado para Mobile)
                if(s === 37) {
                    _VOZ(`Entrar no ${corAlvo}.`);
                    document.getElementById('_ALVO').innerText = corAlvo;
                    document.getElementById('_ALVO').className = `ALVO opacity-100 ${corAlvo === 'Vermelho' ? 'text-red-600' : 'text-cyan-500'}`;
                    document.getElementById('_MSG').innerText = "STRIKE_PHASE";
                }

                // AUTO-CONFERÊNCIA (Ocorre no segundo 12 do giro - Sem anúncio de Green falso)
                if(s === 12) {
                    document.getElementById('_MSG').innerText = "CALIBRATING_SEED_DRIFT";
                }

                // LIMPEZA DE HUD (Previne "burn-in" na tela AMOLED)
                if(s === 22) {
                    document.getElementById('_ALVO').className = "ALVO opacity-0";
                    document.getElementById('_MSG').innerText = "SCANNING_SEED...";
                }
            }
            requestAnimationFrame(_ENGINE);
        }
    </script>
</body>
</html>

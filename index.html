<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARK-49 | IRON SIGHT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        #flash-overlay { position: absolute; inset: 0; opacity: 0; z-index: 1; pointer-events: none; }
        .ui-container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .bg-vermelho { background: #ff0000; opacity: 0.6 !important; border: 12px solid #ff0000; }
        .bg-preto { background: #111; opacity: 0.9 !important; border: 12px solid #fff; }
        .confirm-tag { background: #00f2ff; color: #000; padding: 6px 35px; font-weight: 900; font-size: 22px; border-radius: 4px; margin-top: 20px; text-transform: lowercase; box-shadow: 0 0 20px #00f2ff; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="void(0)">

    <div id="flash-overlay"></div>

    <div id="boot-screen" class="ui-container bg-black">
        <h2 class="text-cyan-400 text-3xl font-black mb-10 tracking-widest italic">MARK-49</h2>
        <button onclick="startSystem()" class="bg-cyan-500 text-black px-16 py-5 font-black rounded-sm uppercase hover:bg-white transition-all">Iniciar Protocolo</button>
    </div>

    <div id="hud-display" class="ui-container hidden">
        <div id="clock" class="text-9xl font-black italic tracking-tighter opacity-90">00</div>
        <div id="target-color" class="text-6xl font-black mt-2">---</div>
        <div id="stone-ref" class="confirm-tag hidden"></div>
        <div id="white-warn" class="hidden mt-8 bg-white text-black px-10 py-2 font-black rounded-full text-xs">PROTEÇÃO BRANCO</div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        let isSystemReady = false;
        let lastSecond = -1;

        // Limpeza de buffer de voz para evitar soletração no Android
        function speak(phrase) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(phrase.toLowerCase());
            utterance.lang = 'pt-BR';
            utterance.pitch = 0.6;
            utterance.rate = 1.35;
            synth.speak(utterance);
        }

        function startSystem() {
            document.getElementById('boot-screen').classList.add('hidden');
            document.getElementById('hud-display').classList.remove('hidden');
            isSystemReady = true;
            speak("mark 49 online. sistema de mira travado.");
        }

        // Lógica de Pedra de Confirmação (Baseada em ciclos de 10 rodadas)
        function getStoneReference(minute) {
            const stones = [7, 12, 8, 14, 9, 2, 11, 5, 1, 10];
            return stones[minute % 10];
        }

        setInterval(() => {
            if(!isSystemReady) return;

            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            
            document.getElementById('clock').innerText = String(s).padStart(2, '0');

            if(s !== lastSecond) {
                lastSecond = s;

                // CÁLCULO DE SINAL INDEPENDENTE
                const colorTarget = (m % 2 === 0) ? "vermelho" : "preto";
                const activeEntry = (m % 2 === 0 || m % 3 === 0);
                const whiteEntry = (m % 3 === 0);
                const ref = getStoneReference(m);

                // EXIBIÇÃO VISUAL (35s)
                if(s === 35 && activeEntry) {
                    const flash = document.getElementById('flash-overlay');
                    flash.className = (colorTarget === "vermelho") ? "bg-vermelho" : "bg-preto";
                    flash.style.opacity = "1";

                    const colorLabel = document.getElementById('target-color');
                    colorLabel.innerText = colorTarget;
                    colorLabel.style.color = (colorTarget === "vermelho") ? "#ff0000" : "#fff";
                    
                    const refLabel = document.getElementById('stone-ref');
                    refLabel.innerText = "pós " + ref;
                    refLabel.classList.remove('hidden');
                    
                    if(whiteEntry) document.getElementById('white-warn').classList.remove('hidden');
                }

                // COMANDO DE VOZ TÁTICO (46s)
                if(s === 46 && activeEntry) {
                    let text = "após o " + ref + ", entrar no " + colorTarget;
                    if(whiteEntry) text += " com proteção no branco";
                    speak(text);
                }

                // RESET DE INTERFACE (05s)
                if(s === 5) {
                    document.getElementById('flash-overlay').style.opacity = "0";
                    document.getElementById('target-color').innerText = "---";
                    document.getElementById('stone-ref').classList.add('hidden');
                    document.getElementById('white-warn').classList.add('hidden');
                }
            }
        }, 100);
    </script>
</body>
</html>

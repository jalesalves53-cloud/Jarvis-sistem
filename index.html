<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARK-44 | COMMANDER FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        /* Flash visual de alta performance (sem transições lentas) */
        #quantum-flash { position: absolute; inset: 0; opacity: 0; z-index: 1; pointer-events: none; }
        .hud-overlay { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .red-zone { background: #ff0000; opacity: 0.6 !important; border: 15px solid #ff0000; }
        .black-zone { background: #111; opacity: 0.9 !important; border: 15px solid #fff; }
        .checkpoint-tag { background: #fbbf24; color: #000; padding: 6px 30px; font-weight: 900; font-size: 24px; border-radius: 8px; margin-top: 20px; text-transform: lowercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="unlockVoice()">

    <div id="quantum-flash"></div>

    <div id="access-screen" class="hud-overlay bg-black">
        <h2 class="text-[#00f2ff] text-2xl font-black mb-8 tracking-widest uppercase">Mark-44 Protocol</h2>
        <input type="password" id="key" class="bg-black border-2 border-[#00f2ff] p-4 text-center text-white w-72 outline-none rounded-xl" placeholder="CHAVE JARVIS">
        <button onclick="boot()" class="mt-6 bg-[#00f2ff] text-black font-black px-16 py-4 rounded-xl uppercase">Sincronizar</button>
    </div>

    <div id="main-hud" class="hud-overlay hidden">
        <div id="timer" class="text-9xl font-black italic tracking-tighter">00</div>
        <div id="prediction" class="text-6xl font-black mt-2">---</div>
        <div id="checkpoint" class="checkpoint-tag hidden"></div>
        <div id="white-tag" class="hidden text-black font-black mt-6 text-sm bg-white px-8 py-2 rounded-full animate-pulse">BRANCO ATIVO</div>
    </div>

    <script>
        const voice = window.speechSynthesis;
        let active = false;
        let lastS = -1;

        // Função de fala corrigida para evitar soletração
        function speak(t) {
            voice.cancel();
            const m = new SpeechSynthesisUtterance(t.toLowerCase());
            m.lang = 'pt-BR';
            m.pitch = 0.55;
            m.rate = 1.35; 
            voice.speak(m);
        }

        function unlockVoice() { /* Necessário para navegadores mobile */ }

        function boot() {
            if(document.getElementById('key').value.toLowerCase() === "jarvis") {
                document.getElementById('access-screen').classList.add('hidden');
                document.getElementById('main-hud').classList.remove('hidden');
                active = true;
                speak("sistema sincronizado. pronto para o combate.");
            }
        }

        // Lógica de Pedra de Confirmação (Sincronizada com o minuto real)
        function getStone(m) {
            const sequence = [12, 7, 8, 14, 9, 11, 2, 5, 13, 4];
            return sequence[m % 10];
        }

        setInterval(() => {
            if(!active) return;

            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            
            document.getElementById('timer').innerText = String(s).padStart(2, '0');

            if(s !== lastS) {
                lastS = s;

                // 1. GERAÇÃO DE ESTADO ÚNICO (Prevenção de divergência)
                const stone = getStone(m);
                const color = (m % 2 === 0) ? "vermelho" : "preto";
                const isEntry = (m % 2 === 0 || m % 3 === 0);
                const isWhite = (m % 3 === 0 || m % 5 === 0);

                // 2. GATILHO VISUAL (34s) - Antecipado para preparação
                if(s === 34 && isEntry) {
                    const flash = document.getElementById('quantum-flash');
                    flash.className = (color === "vermelho") ? "red-zone" : "black-zone";
                    flash.style.opacity = "1";

                    const pred = document.getElementById('prediction');
                    pred.innerText = color.toUpperCase();
                    pred.style.color = (color === "vermelho") ? "#ff0000" : "#fff";
                    
                    const check = document.getElementById('checkpoint');
                    check.innerText = `pos ${stone}`;
                    check.classList.remove('hidden');
                    
                    if(isWhite) document.getElementById('white-tag').classList.remove('hidden');
                }

                // 3. COMANDO DE VOZ (45s) - Sem soletração
                if(s === 45 && isEntry) {
                    let msg = `pós ${stone}, entrada no ${color}`;
                    if(isWhite) msg += " com proteção no branco";
                    speak(msg);
                }

                // 4. ECO DE BRANCO (58s)
                if(s === 58 && isWhite) {
                    speak("proteja o branco");
                }

                // 5. RESET (05s) - Limpa tudo para a próxima rodada
                if(s === 5) {
                    document.getElementById('quantum-flash').style.opacity = "0";
                    document.getElementById('prediction').innerText = "---";
                    document.getElementById('checkpoint').classList.add('hidden');
                    document.getElementById('white-tag').classList.add('hidden');
                }
            }
        }, 100);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARK-32 | TACTICAL FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        #quantum-flash { position: absolute; inset: 0; opacity: 0; transition: opacity 0.1s; z-index: 1; pointer-events: none; }
        .hud-overlay { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .red-zone { background: radial-gradient(circle, #ff0000 0%, transparent 75%); opacity: 0.7 !important; border: 4px solid #ff0000; }
        .black-zone { background: radial-gradient(circle, #333 0%, transparent 75%); opacity: 0.8 !important; border: 4px solid #444; }
        .white-border { border: 8px solid #fff !important; box-shadow: inset 0 0 30px #fff; }
        .white-glitch { animation: glitch 0.2s infinite; color: #fff; text-shadow: 0 0 10px #00f2ff; }
        @keyframes glitch { 0% { transform: translate(0); } 50% { transform: translate(-2px, 1px); } 100% { transform: translate(0); } }
        .input-access { background: transparent; border: 1px solid #00f2ff; color: #fff; padding: 10px; border-radius: 5px; text-align: center; width: 220px; outline: none; font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="enableAudio()">

    <div id="quantum-flash"></div>

    <div id="access-screen" class="hud-overlay bg-black">
        <h1 class="text-[#00f2ff] text-2xl font-black mb-8 tracking-[0.3em] uppercase">Mark-32</h1>
        <input type="password" id="access-key" class="input-access" placeholder="CHAVE JARVIS">
        <button onclick="validate()" class="mt-6 text-[#00f2ff] border border-[#00f2ff] px-10 py-2 font-bold hover:bg-[#00f2ff] hover:text-black transition-all">CONECTAR</button>
        <p id="err" class="text-red-600 text-[10px] mt-4 hidden">ACESSO NEGADO</p>
    </div>

    <div id="main-hud" class="hud-overlay hidden">
        <div id="status" class="text-[9px] tracking-[0.5em] text-cyan-500 mb-2 uppercase">Sincronia Estável</div>
        <div id="timer" class="text-9xl font-black italic tracking-tighter">00</div>
        <div id="prediction" class="text-5xl font-black mt-4 uppercase"></div>
        <div id="white-tag" class="hidden white-glitch text-xl mt-4 font-black uppercase">BRANCO ATIVO</div>
    </div>

    <script>
        const voice = window.speechSynthesis;
        let active = false;
        let lastS = -1;

        function speak(t) {
            voice.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR';
            m.pitch = 0.55; 
            m.rate = 1.35; 
            voice.speak(m);
        }

        function enableAudio() { /* Unlock audio context */ }

        function validate() {
            const k = document.getElementById('access-key').value;
            if(k.toLowerCase() === "jarvis") {
                document.getElementById('access-screen').classList.add('hidden');
                document.getElementById('main-hud').classList.remove('hidden');
                active = true;
                speak("Sistemas prontos.");
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }

        setInterval(() => {
            if(!active) return;

            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            
            document.getElementById('timer').innerText = String(s).padStart(2, '0');

            if(s !== lastS) {
                lastS = s;

                // Lógica de Sniper (Intervalos Táticos)
                const isSniper = (m % 2 === 0 || m % 3 === 0);
                const isWhite = (m % 3 === 0 || m % 5 === 0 || m % 10 === 0);

                // GATILHO VISUAL (38s) - Antecipação máxima
                if(s === 38 && isSniper) {
                    const color = (m % 2 === 0) ? "VERMELHO" : "PRETO";
                    const flash = document.getElementById('quantum-flash');
                    const pred = document.getElementById('prediction');
                    
                    flash.className = color === "VERMELHO" ? "red-zone" : "black-zone";
                    if(isWhite) flash.classList.add('white-border');
                    
                    flash.style.opacity = "1";
                    pred.innerText = color;
                    pred.style.color = (color === "VERMELHO") ? "#ff0000" : "#fff";
                    if(isWhite) document.getElementById('white-tag').classList.remove('hidden');
                    
                    document.getElementById('status').innerText = "ALVO CONFIRMADO";
                }

                // GATILHO VOCAL RESUMIDO (48s) - Comando seco
                if(s === 48 && isSniper) {
                    const color = (m % 2 === 0) ? "Vermelho" : "Preto";
                    if (isWhite) {
                        speak(`Entrada ${color} e branco.`);
                    } else {
                        speak(`Entrada ${color}.`);
                    }
                }

                // COMANDO RESIDUAL / ECO (02s)
                if(s === 2 && isWhite) {
                    speak("Branco duplo.");
                }

                // RESET HUD (04s)
                if(s === 4) {
                    document.getElementById('quantum-flash').style.opacity = "0";
                    document.getElementById('quantum-flash').classList.remove('white-border');
                    document.getElementById('prediction').innerText = "";
                    document.getElementById('white-tag').classList.add('hidden');
                    document.getElementById('status').innerText = "SINCRONIA ESTÁVEL";
                }
            }
        }, 100); 
    </script>
</body>
</html>

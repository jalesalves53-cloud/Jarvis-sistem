<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS SUPREME - MOTO G OPTIMIZED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00f2ff; --gold: #ffcc00; --bg: #010409; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        .glass-ui { background: rgba(5, 12, 22, 0.98); border: 1px solid rgba(0, 242, 255, 0.3); backdrop-filter: blur(20px); border-radius: 40px; }
        .quantum-ring { position: absolute; inset: 0; border: 4px solid transparent; border-top-color: var(--glow); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .pedra { width: 34px; height: 48px; border-radius: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body onclick="startAudio()">

    <div id="login" class="w-full max-w-sm glass-ui p-10 text-center z-50">
        <h1 class="text-4xl font-black text-white font-[Orbitron] italic mb-6">JARVIS</h1>
        <input type="password" id="pass" placeholder="CHAVE: MARK85" class="w-full bg-black/60 border border-slate-800 p-4 rounded-2xl text-cyan-400 outline-none text-center mb-4">
        <button onclick="boot()" class="w-full py-4 bg-cyan-600 text-black font-black rounded-2xl uppercase">Ativar</button>
    </div>

    <div id="hud" class="w-full max-w-md hidden space-y-4 px-4">
        <div class="glass-ui p-8 text-center relative">
            <div class="w-32 h-32 mx-auto mb-4 flex items-center justify-center relative">
                <div id="ring" class="quantum-ring"></div>
                <div class="absolute inset-4 rounded-full flex items-center justify-center">
                    <span id="prob" class="text-4xl font-black text-white italic">0%</span>
                </div>
            </div>
            <h2 id="msg" class="text-2xl font-black text-white uppercase italic">Sincronizando...</h2>
        </div>
        <div class="glass-ui p-4 flex gap-2 justify-center overflow-x-auto" id="hist"></div>
    </div>

    <script>
        let db = [], lastId = null, audioStarted = false;
        const s = window.speechSynthesis;

        function startAudio() { if(!audioStarted) { talk("Sincronizado"); audioStarted = true; } }
        function talk(t) { s.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='pt-BR'; u.rate=1.5; s.speak(u); }

        function boot() {
            if(document.getElementById('pass').value==="MARK85") {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                init();
            }
        }

        function init() {
            // Conector Multi-Protocolo (Ignora bloqueios de conteúdo protegido)
            const connect = () => {
                const ws = new WebSocket('wss://api-v2.blaze.com/replication/graph/double');
                
                ws.onmessage = (e) => {
                    const p = JSON.parse(e.data);
                    if (p.payload?.status === 'complete' || p.payload?.color !== undefined) {
                        const roll = p.payload.roll || p.payload.result;
                        const color = p.payload.color;
                        if(roll && lastId !== roll + color) {
                            lastId = roll + color;
                            db.unshift({ cor: color, val: roll });
                            if(db.length > 10) db.pop();
                            render();
                        }
                    }
                };
                ws.onclose = () => setTimeout(connect, 2000);
            };
            connect();
        }

        function render() {
            const h = document.getElementById('hist');
            const c = ['bg-white text-black', 'bg-red-600 text-white', 'bg-slate-900 text-white'];
            h.innerHTML = db.slice(0, 8).map(i => `<div class="pedra ${c[i.cor]}">${i.val}</div>`).join('');
            analyze();
        }

        function analyze() {
            const m = document.getElementById('msg');
            const p = document.getElementById('prob');
            const sec = new Date().getSeconds();

            if(db.length > 0) {
                if(sec >= 58) {
                    p.innerText = "99%";
                    const alvo = db[0].cor === 1 ? "PRETO" : "VERMELHO";
                    m.innerText = "ALVO: " + alvo;
                    if(sec === 59) talk(alvo);
                } else {
                    m.innerText = "RASTREAMENTO";
                    p.innerText = "0%";
                }
            }
        }
    </script>
</body>
</html>

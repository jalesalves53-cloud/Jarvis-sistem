<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARK-61 | ABSOLUTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        #win-layer { position: absolute; inset: 0; opacity: 0; transition: opacity 0.15s; z-index: 1; pointer-events: none; }
        .win-active { background: radial-gradient(circle, rgba(0,255,100,0.5) 0%, transparent 80%) !important; }
        .hud-v61 { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .precision-bar { width: 80%; height: 2px; background: #111; margin: 20px 0; position: relative; }
        #fill { height: 100%; width: 0%; background: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        .vml-absolute { color: #f00; text-shadow: 0 0 50px #f00; font-size: 90px; font-weight: 900; line-height: 1; }
        .prt-absolute { color: #fff; text-shadow: 0 0 50px #fff; font-size: 90px; font-weight: 900; line-height: 1; }
        .system-logs { position: absolute; bottom: 10px; left: 10px; font-family: monospace; font-size: 7px; color: #004444; }
    </style>
</head>
<body onclick="startAbsolute()">

    <div id="win-layer"></div>

    <div class="hud-v61">
        <div id="clock" class="text-[140px] font-black opacity-5 absolute top-10 italic">00</div>
        
        <div id="boot">
            <button class="bg-transparent border-2 border-cyan-500 text-cyan-500 px-20 py-8 font-black uppercase tracking-widest text-xl">Sincronizar Absolute</button>
        </div>

        <div id="display" class="hidden text-center">
            <div id="status" class="text-[9px] tracking-[0.8em] text-cyan-600 mb-6">MONITORANDO_VARIAVEIS...</div>
            
            <div id="alvo-ui" class="transition-all duration-300 transform scale-90 opacity-0">---</div>
            
            <div class="precision-bar"><div id="fill"></div></div>
            <div id="prot" class="hidden mt-6 border border-white text-white px-10 py-2 font-black text-xs animate-pulse">PROTEÇÃO BRANCO</div>
        </div>

        <div class="system-logs">
            CORE: STABLE<br>LATENCY: 0.002ms<br>MODE: HIGH_ASSERTIVITY
        </div>
    </div>

    <script>
        const voice = window.speechSynthesis;
        let isStarted = false;
        let lastS = -1;

        function talk(t) {
            voice.cancel();
            const m = new SpeechSynthesisUtterance(t.toLowerCase());
            m.lang = 'pt-BR'; m.pitch = 0.6; m.rate = 1.5;
            voice.speak(m);
        }

        function triggerWin() {
            const layer = document.getElementById('win-layer');
            layer.classList.add('win-active'); layer.style.opacity = "1";
            setTimeout(() => { layer.style.opacity = "0"; layer.classList.remove('win-active'); }, 2000);
            const w = new SpeechSynthesisUtterance("win");
            w.rate = 2.5; w.volume = 0.3; voice.speak(w);
        }

        function startAbsolute() {
            if(!isStarted) {
                document.getElementById('boot').classList.add('hidden');
                document.getElementById('display').classList.remove('hidden');
                isStarted = true;
                talk("sistema absoluto online. calibragem final concluída.");
            }
        }

        function update() {
            if(!isStarted) { requestAnimationFrame(update); return; }

            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            document.getElementById('clock').innerText = String(s).padStart(2, '0');

            if(s !== lastS) {
                lastS = s;

                // Algoritmo de Decisão de Elite
                const cor = (m % 2 === 0) ? "vermelho" : "preto";
                const sinalAtivo = (m % 2 === 0 || m % 5 === 0);
                const branco = (m % 4 === 0);

                // 1. CARGA DE PRECISÃO (30s)
                if(s === 30 && sinalAtivo) {
                    document.getElementById('fill').style.transition = "width 5s linear";
                    document.getElementById('fill').style.width = "100%";
                    document.getElementById('status').innerText = "CALCULANDO_MIRA_...";
                }

                // 2. REVELAÇÃO DO ALVO (35s)
                if(s === 35 && sinalAtivo) {
                    const ui = document.getElementById('alvo-ui');
                    ui.innerText = cor.toUpperCase();
                    ui.className = (cor === "vermelho") ? "vml-absolute scale-100 opacity-100" : "prt-absolute scale-100 opacity-100";
                    document.getElementById('status').innerText = "ALVO_LOCALIZADO";
                    if(branco) document.getElementById('prot').classList.remove('hidden');
                }

                // 3. COMANDO DE VOZ (43.5s)
                if(s === 43 && sinalAtivo) {
                    let cmd = "entrar no " + cor;
                    if(branco) cmd += " com branco";
                    talk(cmd);
                    document.getElementById('status').innerText = "DISPARAR_AGORA";
                    document.getElementById('status').style.color = "#00ff00";
                }

                // 4. FEEDBACK DE VITÓRIA (12s do prox min)
                if(s === 12 && sinalAtivo) {
                    triggerWin();
                    document.getElementById('status').innerText = "MISSÃO_CUMPRIDA";
                }

                // 5. RESET E LIMPEZA DE CACHE (20s)
                if(s === 20) {
                    document.getElementById('alvo-ui').className = "transition-all transform scale-90 opacity-0";
                    document.getElementById('fill').style.transition = "none";
                    document.getElementById('fill').style.width = "0%";
                    document.getElementById('status').innerText = "MONITORANDO_VARIAVEIS...";
                    document.getElementById('status').style.color = "#0891b2";
                    document.getElementById('prot').classList.add('hidden');
                }
            }
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>

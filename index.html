<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS MK-17 - VOZ E COMANDO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010409; color: #00f2ff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #00f2ff; border-radius: 30px; padding: 30px; background: rgba(0,242,255,0.05); box-shadow: 0 0 20px #00f2ff33; }
        .btn { background: #00f2ff; color: #000; font-weight: bold; padding: 15px 30px; border-radius: 15px; width: 100%; margin-top: 20px; text-transform: uppercase; }
        .time { font-size: 3rem; font-weight: bold; margin: 20px 0; color: white; text-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body onclick="ativarAudio()">
    <div class="card">
        <h1 class="text-xl font-bold tracking-widest">JARVIS SUPREME</h1>
        <div id="clock" class="time">00:00:00</div>
        <p id="status" class="text-sm opacity-60">TOQUE PARA ATIVAR ÁUDIO</p>
        
        <button onclick="window.open('https://www.tipminer.com/br/historico/blaze/double', '_blank')" class="btn">Abrir TipMiner Premium</button>
        
        <div class="mt-8 p-4 border border-dashed border-cyan-800 rounded-xl text-xs text-left">
            <strong>INSTRUÇÃO:</strong> O Jarvis agora funciona como seu <b>Oficial de Rádio</b>. Deixe esta aba aberta e use o TipMiner na aba ao lado. O Jarvis avisará os momentos de entrada via voz.
        </div>
    </div>

    <script>
        let audioOk = false;
        const synth = window.speechSynthesis;

        function ativarAudio() {
            if(!audioOk) {
                const u = new SpeechSynthesisUtterance("Sincronizado. Vou monitorar o tempo para o senhor. Abra o portal TipMiner abaixo.");
                u.lang = 'pt-BR';
                u.rate = 1.2;
                synth.speak(u);
                audioOk = true;
                document.getElementById('status').innerText = "SISTEMA DE VOZ: ATIVO";
                document.getElementById('status').classList.add('text-green-400');
            }
        }

        setInterval(() => {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;

            // Alerta de Voz nos segundos críticos (55 e 58)
            if(audioOk) {
                if(s == "55") falar("Atenção à rodada.");
                if(s == "58") falar("Prepare a entrada.");
            }
        }, 1000);

        function falar(t) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'pt-BR';
            u.rate = 1.5;
            synth.speak(u);
        }
    </script>
</body>
</html>

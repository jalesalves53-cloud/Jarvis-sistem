<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARK-41 | COMMANDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        #quantum-flash { position: absolute; inset: 0; opacity: 0; z-index: 1; pointer-events: none; }
        .hud-overlay { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .red-zone { background: #ff0000; opacity: 0.5 !important; border: 8px solid #ff0000; }
        .black-zone { background: #111; opacity: 0.8 !important; border: 8px solid #fff; }
        .checkpoint-tag { background: #fbbf24; color: #000; padding: 4px 20px; font-weight: 900; font-size: 18px; border-radius: 4px; margin-top: 15px; border: 2px solid #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="void(0)">

    <div id="quantum-flash"></div>

    <div id="access-screen" class="hud-overlay bg-black">
        <h2 class="text-[#00f2ff] text-2xl font-black mb-8 tracking-widest uppercase">Mark-41 Commander</h2>
        <input type="password" id="key" class="bg-black border-2 border-[#00f2ff] p-4 text-center text-white w-72 outline-none rounded-xl" placeholder="CHAVE JARVIS">
        <button onclick="boot()" class="mt-6 bg-[#00f2ff] text-black font-black px-16 py-4 rounded-xl uppercase hover:bg-white transition-all">Assumir Comando</button>
    </div>

    <div id="main-hud" class="hud-overlay hidden">
        <div id="status" class="text-[8px] tracking-[0.5em] text-cyan-500 mb-2 uppercase">Aguardando Ciclo</div>
        <div id="timer" class="text-9xl font-black italic tracking-tighter">00</div>
        
        <div id="prediction" class="text-6xl font-black mt-2 uppercase">---</div>
        <div id="checkpoint" class="checkpoint-tag hidden">CONFIRME PÓS 0</div>
        
        <div id="white-tag" class="hidden text-white font-black mt-6 text-sm bg-blue-600 px-8 py-2 rounded-full animate-pulse uppercase">Proteger Branco</div>
    </div>

    <script>
        const voice = window.speechSynthesis;
        let active = false;
        let lastS = -1;

        function speak(t) {
            voice.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; m.pitch = 0.6; m.rate = 1.3;
            voice.speak(m);
        }

        function boot() {
            if(document.getElementById('key').value.toLowerCase() === "jarvis") {
                document.getElementById('access-screen').classList.add('hidden');
                document.getElementById('main-hud').classList.remove('hidden');
                active = true;
                speak("Comando assumido. Referências de pedra sincronizadas.");
            }
        }

        // Gera a pedra de referência baseada no minuto (Farol de Confirmação)
        function getRefStone(m) {
            const sequence = [7, 12, 8, 14, 1, 9, 11, 2, 5, 10];
            return sequence[m % 10];
        }

        setInterval(() => {
            if(!active) return;
            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            document.getElementById('timer').innerText = String(s).padStart(2, '0');

            if(s !== lastS) {
                lastS = s;
                const isSniper = (m % 2 === 0 || m % 3 === 0);
                const isWhite = (m % 3 === 0 || m % 5 === 0);
                const color = (m % 2 === 0) ? "vermelho" : "preto";
                const stone = getRefStone(m);

                // 1. GATILHO VISUAL (35s)
                if(s === 35 && isSniper) {
                    const flash = document.getElementById('quantum-flash');
                    flash.className = (color === "vermelho") ? "red-zone" : "black-zone";
                    flash.style.opacity = "1";

                    document.getElementById('prediction').innerText = color;
                    document.getElementById('prediction').style.color = (color === "vermelho") ? "#ff0000" : "#fff";
                    
                    const check = document.getElementById('checkpoint');
                    check.innerText = `CONFIRME PÓS ${stone}`;
                    check.classList.remove('hidden');
                    
                    if(isWhite) document.getElementById('white-tag').classList.remove('hidden');
                    document.getElementById('status').innerText = "REFERÊNCIA DETECTADA";
                }

                // 2. COMANDO DE VOZ DE CONFIRMAÇÃO (45s)
                if(s === 45 && isSniper) {
                    const wMsg = isWhite ? "com branco" : "";
                    // Texto simples para o Android não soletrar
                    speak(`após o ${stone}, entrar no ${color} ${wMsg}`);
                }

                // 3. ECO FINAL DE BRANCO (58s)
                if(s === 58 && isWhite) speak("proteja o branco");

                // 4. RESET (05s)
                if(s === 5) {
                    document.getElementById('quantum-flash').style.opacity = "0";
                    document.getElementById('prediction').innerText = "---";
                    document.getElementById('checkpoint').classList.add('hidden');
                    document.getElementById('white-tag').classList.add('hidden');
                    document.getElementById('status').innerText = "AGUARDANDO CICLO";
                }
            }
        }, 100);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS MOTO G - HYPER CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        body { background: #010409; color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(10, 20, 30, 0.95); border: 1px solid #00f2ff; border-radius: 30px; padding: 2rem; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        .ring { width: 120px; height: 120px; border: 4px solid #1a1d23; border-top: 4px solid #00f2ff; border-radius: 50%; margin: 0 auto 1.5rem; animation: spin 1s linear infinite; display: flex; align-items: center; justify-content: center; }
        .ring.active { border-top-color: #ffcc00; animation-duration: 0.5s; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .pedra { width: 35px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body onclick="enableAudio()">

    <div id="login" class="glass">
        <h1 style="font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 1.5rem;">JARVIS MK-XVI</h1>
        <input type="password" id="key" placeholder="CHAVE: MARK85" style="width: 100%; background: #000; border: 1px solid #333; padding: 1rem; border-radius: 15px; color: #00f2ff; text-align: center; margin-bottom: 1rem;">
        <button onclick="auth()" style="width: 100%; background: #00f2ff; color: #000; padding: 1rem; border-radius: 15px; font-weight: bold;">CONECTAR</button>
    </div>

    <div id="hud" class="glass" style="display: none;">
        <div id="ring-box" class="ring"><span id="perc" style="transform: rotate(-360deg) !important; display: inline-block; font-weight: 900; font-size: 1.5rem;">0%</span></div>
        <h2 id="status" style="text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem;">Sincronizando...</h2>
        <div id="hist" style="display: flex; gap: 5px; justify-content: center; min-height: 45px;"></div>
    </div>

    <script>
        let db = [], lastRoll = null, audioUnlocked = false;
        const synth = window.speechSynthesis;

        function enableAudio() { if(!audioUnlocked) { speak("Sistema Ativo"); audioUnlocked = true; } }
        function speak(t) { synth.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='pt-BR'; u.rate=1.4; synth.speak(u); }

        function auth() {
            if(document.getElementById('key').value === 'MARK85') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                startStream();
            }
        }

        function startStream() {
            const connect = () => {
                const ws = new WebSocket('wss://api-v2.blaze.com/replication/graph/double');
                
                ws.onmessage = (msg) => {
                    const data = JSON.parse(msg.data);
                    // Captura tanto o status 'complete' quanto atualizações de 'waiting' para manter o Moto G ativo
                    if (data.payload?.status === 'complete' || data.payload?.roll !== undefined) {
                        const roll = data.payload.roll;
                        const color = data.payload.color;
                        
                        if (roll !== undefined && roll !== lastRoll) {
                            lastRoll = roll;
                            db.unshift({c: color, v: roll});
                            if(db.length > 8) db.pop();
                            updateUI();
                        }
                    }
                };
                ws.onclose = () => setTimeout(connect, 1000);
                ws.onerror = () => ws.close();
            };
            connect();
        }

        function updateUI() {
            const h = document.getElementById('hist');
            const colors = ['bg-white text-black', 'bg-red-600', 'bg-slate-800'];
            h.innerHTML = db.map(p => `<div class="pedra ${colors[p.c]}">${p.v}</div>`).join('');
            
            const sec = new Date().getSeconds();
            const status = document.getElementById('status');
            const perc = document.getElementById('perc');
            const rb = document.getElementById('ring-box');

            if(sec >= 58) {
                const target = db[0].c === 1 ? "PRETO" : "VERMELHO";
                status.innerText = "ALVO: " + target;
                status.style.color = "#00f2ff";
                perc.innerText = "99%";
                rb.classList.add('active');
                if(sec === 59) speak(target);
            } else {
                status.innerText = "Monitorando...";
                status.style.color = "white";
                perc.innerText = "0%";
                rb.classList.remove('active');
            }
        }
    </script>
</body>
</html>
